<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Smjestaj - Ispuna M4y plava</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=IBM+Plex+Serif:wght@500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="site-shell">
    <header class="topbar">
      <a class="brand" href="/">
        <span class="brand-dot"></span>
        Ispuna - M4y plava
      </a>
      <nav class="nav">
        <a href="/">Naslovnica</a>
        <a href="/apartments.html">Smjestaj</a>
        <a href="/rentacar.html">Rent a car</a>
        <a href="/activities.html">Aktivnosti</a>
        <a href="/faq.html">FAQ i info guide</a>
        <a href="/directions.html">Kako do nas</a>
        <a href="/about.html">O nama</a>
      </nav>
    </header>

    <section class="page-intro card-plain apartments-hero fade-up">
      <h1>Pronadi svoj idealan apartman</h1>
      <p>Pretrazi smjestaj po gradu, terminu i broju gostiju.</p>
    </section>

    <section class="booking-search card-plain fade-up">
      <form id="apartmentsSearchForm" class="booking-search-grid">
        <label>
          Lokacija
          <input name="destination" placeholder="npr. Split" />
        </label>
        <label>
          Check-in
          <input name="checkin" type="date" required />
        </label>
        <label>
          Check-out
          <input name="checkout" type="date" required />
        </label>
        <label>
          Gosti
          <input name="guests" type="number" min="1" value="2" required />
        </label>
        <button type="submit" class="btn booking-search-btn">Pretrazi</button>
      </form>
    </section>

    <section class="results-meta fade-up">
      <h2 id="resultsTitle">Dostupni apartmani</h2>
      <p id="resultsSummary" class="muted">Ucitavanje rezultata...</p>
    </section>

    <section id="apartmentsList" class="panel-stack booking-results">
      Ucitavanje apartmana...
    </section>
  </div>
  <script src="/app.js"></script>
</body>
</html>
