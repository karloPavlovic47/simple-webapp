<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Rent a car - Ispuna M4y plava</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=IBM+Plex+Serif:wght@500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="site-shell">
    <header class="topbar">
      <a class="brand" href="/">
        <span class="brand-dot"></span>
        Ispuna - M4y plava
      </a>
      <nav class="nav">
        <a href="/">Naslovnica</a>
        <a href="/apartments.html">Smjestaj</a>
        <a href="/rentacar.html">Rent a car</a>
        <a href="/activities.html">Aktivnosti</a>
        <a href="/faq.html">FAQ i info guide</a>
        <a href="/directions.html">Kako do nas</a>
        <a href="/about.html">O nama</a>
      </nav>
    </header>

    <section class="page-intro card-plain apartments-hero fade-up">
      <h1>Rent a car pretraga</h1>
      <p>Odaberi lokaciju i termine te rezerviraj vozilo direktno iz rezultata.</p>
    </section>

    <section class="booking-search card-plain fade-up">
      <form id="carSearchForm" class="booking-search-grid">
        <label>
          Lokacija preuzimanja
          <select name="location" required>
            <option value="Split">Split</option>
            <option value="Dubrovnik">Dubrovnik</option>
            <option value="Zagreb" selected>Zagreb</option>
          </select>
        </label>
        <label>
          Datum preuzimanja
          <input name="pickup" type="date" required />
        </label>
        <label>
          Datum povrata
          <input name="dropoff" type="date" required />
        </label>
        <label>
          Vozaca
          <input name="drivers" type="number" min="1" max="2" value="1" required />
        </label>
        <button type="submit" class="btn booking-search-btn">Pretrazi</button>
      </form>
    </section>

    <section class="results-meta fade-up">
      <h2 id="carResultsTitle">Dostupna vozila</h2>
      <p id="carResultsSummary" class="muted">Ucitavanje rezultata...</p>
    </section>

    <section id="carListings" class="panel-stack booking-results">
      Ucitavanje vozila...
    </section>

  </div>
  <script src="/app.js"></script>
</body>
</html>
