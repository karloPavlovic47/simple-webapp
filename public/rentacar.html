<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Rent a car - Ispuna M4y plava</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=IBM+Plex+Serif:wght@500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="site-shell">
    <header class="topbar">
      <a class="brand" href="/">
        <span class="brand-dot"></span>
        Ispuna - M4y plava
      </a>
      <nav class="nav">
        <a href="/">Naslovnica</a>
        <a href="/apartments.html">Smjestaj</a>
        <a href="/rentacar.html">Rent a car</a>
        <a href="/activities.html">Aktivnosti</a>
        <a href="/faq.html">FAQ i info guide</a>
        <a href="/directions.html">Kako do nas</a>
        <a href="/about.html">O nama</a>
      </nav>
    </header>

    <section class="page-intro card-plain">
      <h1>Rent a car sucelje</h1>
      <p>Zaseban kalendar dostupnosti i rezervacija vozila po tipu i lokaciji.</p>
    </section>

    <section class="split-layout">
      <article class="card-plain" id="carCalendarWrap">
        <h2>Kalendar vozila</h2>
        <div id="carCalendar">Ucitavanje kalendara...</div>
      </article>

      <article class="card-plain">
        <h2>Rezervacija vozila</h2>
        <form id="rentForm" class="stack-form">
          <label>Ime i prezime<input name="name" required></label>
          <label>Email<input name="email" type="email" required></label>
          <label>Datum preuzimanja<input name="pickup" type="date" required></label>
          <label>Datum povrata<input name="dropoff" type="date" required></label>
          <label>Tip vozila
            <select name="carType">
              <option value="economy">Economy</option>
              <option value="compact">Compact</option>
              <option value="suv">SUV</option>
            </select>
          </label>
          <label>Lokacija preuzimanja
            <select name="location">
              <option value="Split">Split</option>
              <option value="Dubrovnik">Dubrovnik</option>
              <option value="Zagreb" selected>Zagreb</option>
            </select>
          </label>
          <button type="submit" class="btn">Potvrdi rent a car</button>
        </form>
        <pre id="rentOutput"></pre>
      </article>
    </section>

  </div>
  <script src="/app.js"></script>
</body>
</html>
